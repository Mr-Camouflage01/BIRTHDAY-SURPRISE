<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Roshni</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>

<body>

<!-- Background Animation -->
<div class="stars"></div>
<div class="hearts"></div>
<div class="balloons"></div>

<!-- Background Music -->
<audio id="music" loop>
    <source src="music/happy-birthday.mp3" type="audio/mp3">
</audio>

<button id="musicBtn">
    🎵 Play Music
</button>

<!-- Countdown Screen -->

<section id="countdownPage">

    <div class="countCard">

        <h1>🎂 Birthday Surprise 🎂</h1>

        <p>Something special is waiting...</p>

        <div id="countdown">
            5
        </div>

    </div>

</section>

<!-- Main Page -->

<section id="mainPage">

    <!-- Hero -->

    <div class="hero">

        <h1 class="title">

            Happy Birthday

        </h1>

        <h2 class="name">

            Dear Sister ❤️

        </h2>

        <p>

            Today is all about celebrating the wonderful person you are.

        </p>

        <button id="giftBtn">

            🎁 Open Your Gift

        </button>

    </div>

</section>

<!-- Gift Box -->

<section id="giftPage">

<div class="giftBox">

<div class="giftTop"></div>

<div class="giftBody"></div>

<div class="ribbonVertical"></div>

<div class="ribbonHorizontal"></div>

</div>

<button id="openGift">

Open Surprise ❤️

</button>

</section>

<!-- Surprise -->

<section id="surprisePage">

<div class="glass">

<h1>

🎉 Happy Birthday 🎉

</h1>

<h2>

My Amazing Sister ❤️

</h2>

<!-- Cake -->

<div class="cake">

<div class="candle"></div>

<div class="flame"></div>

<div class="layer1"></div>

<div class="layer2"></div>

<div class="layer3"></div>

</div>

<!-- Slideshow -->

<div class="slideshow">

<img id="slideImage" src="images/photo1.jpg">

</div>

<!-- Letter -->

<div class="letter">

<h2>A Letter For You 💌</h2>

<p id="typewriter"></p>

</div>

<button id="celebrate">

🎆 Celebrate

</button>

</div>

</section>

<!-- Fireworks -->

<canvas id="fireworks"></canvas>

<!-- Confetti -->

<div id="confetti"></div>

<footer>

Made with ❤️ by Your Brother

</footer>

<script src="script.js"></script>

</body>
</html>
